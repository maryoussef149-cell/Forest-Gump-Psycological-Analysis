      const { useState, useEffect, useRef } = React;

      /* Mobile detection hook */
      function useIsMobile(){
        const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
        useEffect(()=>{
          const handleResize = () => setIsMobile(window.innerWidth < 768);
          window.addEventListener('resize', handleResize);
          return () => window.removeEventListener('resize', handleResize);
        }, []);
        return isMobile;
      }

        therun:"5.jpeg",
        jennysloss:"2.jpeg",

          img:"military",
          felt:"Relief. For perhaps the first time outside his mother's house, the world had clear rules. Do this, then this, then this. No ambiguity.",

          how:"Forrest honored Bubba by living the dream Bubba described \"the shrimping business\". This is called continuing bonds in grief psychology: maintaining a relationship with the lost person through meaningful action rather than trying to \"move on.\" If you carry survivor's guilt, ask: what did that person want for the world, or for me? Then do that. Not as punishment but as tribute.",

      /*  scroll reveal hook  */
      function useReveal(t=0.1){
        const ref=useRef(null);
        const [vis,setVis]=useState(false);
        useEffect(()=>{
          const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting)setVis(true);},{threshold:t});
          if(ref.current)obs.observe(ref.current);
          return()=>obs.disconnect();
        },[]);
        return [ref,vis];
      }

      /*  Scroll feather  */
      function ScrollFeather(){
        const isMobile = useIsMobile();
        const [pos,setPos]=useState({x:50,y:-60,rot:-15,op:0});

        useEffect(()=>{
          function onScroll(){
            const scrollY   = window.scrollY;
            const docH      = document.documentElement.scrollHeight - window.innerHeight;
            const prog      = docH > 0 ? Math.min(scrollY / docH, 1) : 0;

            /* Horizontal: gentle sine wave drift left-right */
            const xWave     = Math.sin(prog * Math.PI * 5) * 28;
            const x         = 50 + xWave;          /* % from left */

            /* Vertical: follows scroll progress top → bottom of viewport */
            const y         = prog * 92;            /* vh */

            /* Rotation: tilts with the wave */
            const rot       = Math.sin(prog * Math.PI * 5) * 18 - 8;

            /* Opacity: fade in quickly, stay visible, fade out near end */
            const op        = prog < 0.04 ? prog / 0.04
                            : prog > 0.94 ? (1 - prog) / 0.06
                            : 1;

            setPos({x, y, rot, op});
          }

          window.addEventListener("scroll", onScroll, {passive:true});
          onScroll();
          return () => window.removeEventListener("scroll", onScroll);
        },[]);

        return(
          <div style={{
            position:"fixed",
            left:`${pos.x}%`,
            top:`${pos.y}vh`,
            transform:`translateX(-50%) rotate(${pos.rot}deg)`,
            fontSize:isMobile?36:52,
            opacity:pos.op * 0.75,
            pointerEvents:"none",
            zIndex:998,
            transition:"opacity .15s linear",
            willChange:"transform, top, left",
          }}>
            🪶
          </div>
        );
      }

      /*  Hero  */

              <div style={{fontFamily:"'Parkinsans',sans-serif",fontWeight:400,fontSize:isMobile?15:15,color:"#9A8050",lineHeight:isMobile?1.6:1.74,marginBottom:isMobile?30:40}}>Nine moments from one fictional life and what they reveal about the emotional experiences we all share but rarely name.</div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,animation:"scrollNudge 2.4s ease-in-out infinite"}}>
                <div style={{width:isMobile?16:24,height:1,background:"rgba(200,160,64,.35)"}}/>
                <span style={{fontFamily:"'Parkinsans',sans-serif",fontWeight:400,fontSize:isMobile?10:10,letterSpacing:"0.22em",color:"#C8A040",opacity:.45,textTransform:"uppercase"}}>scroll</span>
                <div style={{width:isMobile?16:24,height:1,background:"rgba(200,160,64,.35)"}}/>
              </div>
            </div>
            <style dangerouslySetInnerHTML={{__html:`
              @import url('https://fonts.googleapis.com/css2?family=Parkinsans:wght@300;400;500;600;700;800&display=swap');
              *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
              html{scroll-behavior:smooth;}
              body{background:#1A1408;}
              ::-webkit-scrollbar{width:3px;}
              ::-webkit-scrollbar-track{background:transparent;}
              ::-webkit-scrollbar-thumb{background:rgba(200,160,64,.3);border-radius:2px;}
              @keyframes glowPulse{0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.12);}}
              @keyframes scrollNudge{0%,100%{transform:translateY(0);opacity:.45;}50%{transform:translateY(5px);opacity:.75;}}
              @keyframes featherFloat{0%,100%{transform:translateX(-50%) rotate(-8deg) translateY(0);}50%{transform:translateX(-50%) rotate(8deg) translateY(-8px);}}
              @keyframes featherLand{0%{transform:translateX(-50%) translateY(-80px) rotate(20deg);opacity:0;}100%{transform:translateX(-50%) translateY(0) rotate(-4deg);opacity:1;}}
            `}}/>
          </section>
        );

      /*  Footer with landing feather  */
      function Footer(){
        const isMobile = useIsMobile();
        const [ref,vis]=useReveal(.15);

        useEffect(()=>{

        },[vis]);
        return(
          <footer style={{background:"#0E0C07",padding:isMobile?"0 16px 40px":"0 24px 56px",textAlign:"center",overflow:"hidden"}}>
            <div ref={ref} style={{height:isMobile?100:160,position:"relative",display:"flex",alignItems:"flex-end",justifyContent:"center"}}>

                animation:landed?"featherFloat 5s ease-in-out .9s infinite":vis?"featherLand 1.1s cubic-bezier(.22,1,.36,1) forwards":"none",
                opacity:vis?1:0,
                transformOrigin:"center bottom",
                willChange:"transform",
              }}>🪶</div>
            </div>
            <div ref={textRef} style={{opacity:textVis?1:0,transform:textVis?"translateY(0)":"translateY(12px)",transition:"opacity .7s ease .3s,transform .7s ease .3s"}}>

              <div style={{fontFamily:"'Parkinsans',sans-serif",fontSize:isMobile?9:9.5,letterSpacing:"0.22em",color:"#38280E",textTransform:"uppercase"}}>Forrest Gump · 1994 · Robert Zemeckis</div>

      /*  Root  */
      function App(){
        const [active,setActive]=useState(-1);
        useEffect(()=>{
          const obs=CHAPTERS.map((_,i)=>{
            const el=document.getElementById(`s${i}`);
            if(!el)return null;
            const o=new IntersectionObserver(([e])=>{if(e.isIntersecting)setActive(i);},{threshold:.3});
            o.observe(el);
            return o;
          });
          return()=>obs.forEach(o=>o?.disconnect());
        },[]);
        return(
          <>
            <DotNav active={active}/>
            <ScrollFeather/>
            <Hero/>
            {CHAPTERS.map((ch,i)=>(<div key={ch.id} id={`s${i}`}><Chapter ch={ch}/></div>))}
            <Footer/>
          </>
        );
      }
const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />); 
    </script>
  </body>
</html>
